name: Weekly Keyword Research

on:
  schedule:
    - cron: "0 8 * * 1"  # Monday 8:00am UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keyword-research:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install anthropic python-dotenv

      - name: Run keyword research
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/keyword_research.py

      - name: Commit updated keywords
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/keywords.txt
          git diff --staged --quiet || git commit -m "chore: add weekly keyword research results [skip ci]"

      - name: Push to main
        run: git push origin main
